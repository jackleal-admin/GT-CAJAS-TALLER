window.togglePagoKonfio=async function(){
  const key=`${kState.anio}-${String(kState.mes).padStart(2,'0')}`;
  if(!S.konfioData[key])S.konfioData[key]={gastos:[]};
  S.konfioData[key].pagado=!S.konfioData[key].pagado;
  await fbSave();toast('Estatus actualizado');renderKonfio();
};

window.eliminarGastoKonfio=async function(idx){
  if(!confirm('¿Eliminar este gasto?'))return;
  const key=`${kState.anio}-${String(kState.mes).padStart(2,'0')}`;
  S.konfioData[key].gastos.splice(idx,1);
  await fbSave();toast('Gasto eliminado');renderKonfio();
};

window.registrarGastoKonfio=async function(){
  const key=`${kState.anio}-${String(kState.mes).padStart(2,'0')}`;
  if(!S.konfioData[key])S.konfioData[key]={gastos:[],pagado:false};
  const proyecto=document.getElementById('kf-equipo').value;
  const proveedor=document.getElementById('kf-proveedor').value.trim();
  const concepto=document.getElementById('kf-desc').value.trim();
  if(!proyecto||!proveedor||!concepto){toast('Completa todos los campos',true);return;}
  const uuidEl=document.getElementById('kf-uuid');
  const uuid=uuidEl.dataset?.uuid||uuidEl.value;
  const fechaFact=document.getElementById('kf-nofact').dataset?.rawFecha||'';
  const gasto={
    id:genId(),proyecto,proveedor,concepto,
    noFactura:document.getElementById('kf-nofact').value,
    fechaFactura:fechaFact,
    uuid:uuid||('MANUAL-'+genId()),
    subtotal:parseFloat(document.getElementById('kf-subtotal').value)||0,
    iva:parseFloat(document.getElementById('kf-iva').value)||0,
    total:parseFloat(document.getElementById('kf-total').value)||0,
    registradoPor:S.user.name,registradoEn:new Date().toISOString()
  };
  S.konfioData[key].gastos.push(gasto);
  await fbSave();limpiarKonfio();toast('Gasto KONFIO registrado ✓');renderKonfio();
};

window.limpiarKonfio=function(){
  ['kf-equipo','kf-proveedor','kf-desc','kf-nofact','kf-fecha','kf-uuid','kf-subtotal','kf-iva','kf-total'].forEach(id=>{
    const el=document.getElementById(id);if(el){el.value='';delete el.dataset.rawFecha;delete el.dataset.uuid;}
  });
  const xa=document.getElementById('konfio-xml-alert');if(xa)xa.innerHTML='';
  const ki=document.getElementById('kf-xml-input');if(ki)ki.value='';
  const kb=document.getElementById('kf-biblio-search-box');if(kb)kb.style.display='none';
  const kr=document.getElementById('kf-biblio-results');if(kr)kr.innerHTML='';
};

window.toggleKfBiblioSearch=function(){
  const box=document.getElementById('kf-biblio-search-box');
  if(box)box.style.display=box.style.display==='none'?'block':'none';
};

window.buscarBibliotecaKonfio=function(){
  const rfc=document.getElementById('kf-biblio-rfc').value.trim().toUpperCase();
  if(!rfc){document.getElementById('kf-biblio-results').innerHTML='<div style="font-size:12px;color:var(--text2)">Ingresa un RFC para buscar</div>';return;}
  const resultados=S.biblioteca.filter(x=>x.rfc?.includes(rfc)||x.nombre?.toUpperCase().includes(rfc));
  const el=document.getElementById('kf-biblio-results');
  if(!resultados.length){el.innerHTML='<div style="font-size:12px;color:var(--text2)">Sin resultados</div>';return;}
  el.innerHTML=`<div class="tbl-wrap"><table>
    <thead><tr><th>UUID</th><th>Proveedor</th><th>Folio</th><th>Total</th><th>Estado</th><th></th></tr></thead>
    <tbody>${resultados.map(x=>`<tr>
      <td style="font-size:10px">${(x.uuid||'').substring(0,16)}…</td>
      <td>${x.nombre||x.rfc}</td><td>${x.noFact}</td>
      <td style="text-align:right">${fmt(x.total)}</td>
      <td>${x.usado?'<span style="color:#c0392b;font-size:11px">Usado</span>':'<span style="color:#1b5e20;font-size:11px">Disponible</span>'}</td>
      <td>${!x.usado?`<button onclick="usarDeBibliotecaKonfio('${x.uuid}')" class="btn-gold btn-sm">Usar</button>`:''}</td>
    </tr>`).join('')}</tbody>
  </table></div>`;
};

window.usarDeBibliotecaKonfio=function(uuid){
  const x=S.biblioteca.find(b=>b.uuid===uuid);
  if(!x)return;
  if(getAllUUIDs().includes(uuid)){toast('UUID ya registrado',true);return;}
  const setVal=(id,val)=>{const el=document.getElementById(id);if(el)el.value=val;};
  setVal('kf-nofact',x.noFact);
  document.getElementById('kf-nofact').dataset.rawFecha=x.fecha;
  setVal('kf-fecha',x.fecha?new Date(x.fecha).toLocaleDateString('es-MX'):'');
  document.getElementById('kf-uuid').value=x.uuid;
  document.getElementById('kf-uuid').dataset.uuid=x.uuid;
  setVal('kf-subtotal',x.subtotal?.toFixed(2)||'');
  setVal('kf-iva',x.iva?.toFixed(2)||'');
  setVal('kf-total',x.total?.toFixed(2)||'');
  setVal('kf-proveedor',x.nombre||'');
  document.getElementById('konfio-xml-alert').innerHTML=`<div class="alert alert-ok"><i class="ti ti-circle-check"></i> Datos cargados de la biblioteca</div>`;
  document.getElementById('kf-biblio-search-box').style.display='none';
};

window.exportarKonfio=function(){
  const key=`${kState.anio}-${String(kState.mes).padStart(2,'0')}`;
  const data=S.konfioData[key];
  if(!data?.gastos?.length){toast('Sin gastos para exportar',true);return;}
  const GOLD='C2AB74',GOLDD='A8924F',WHITE='FFFFFF',CREAM='FAF6EE',GRAY='606060',DARK='1A1A1A';
  const mfmt='"$"#,##0.00';
  function gf(hex){return{fgColor:{rgb:hex},patternType:'solid'};}
  function bf(bold,color,sz){return{bold:bold||false,color:{rgb:color||DARK},sz:sz||9,name:'Arial'};}
  function ac(h){return{horizontal:h||'center',vertical:'center'};}
  const headers=['EMPRESA','FECHA','PROYECTO','PROVEEDOR','CONCEPTO','NO. FACTURA','UUID','SUBTOTAL','IVA','TOTAL'];
  const rows=data.gastos.map(g=>['GRUPO TREGO',fmtDate(g.fechaFactura),g.proyecto,g.proveedor,g.concepto,g.noFactura,g.uuid,g.subtotal,g.iva,g.total]);
  const tS=data.gastos.reduce((s,g)=>s+(g.subtotal||0),0);
  const tI=data.gastos.reduce((s,g)=>s+(g.iva||0),0);
  const tT=data.gastos.reduce((s,g)=>s+(g.total||0),0);
  const titulo=`KONFIO — ${MESES[kState.mes-1].toUpperCase()} ${kState.anio}`;
  const aoa=[['GRUPO TREGO SERVICIOS E INGENIERÍA S.A. DE C.V.'],[titulo],['Fecha de generación: '+fmtDate(new Date().toISOString()),'','','','','','','','',''],headers,...rows,['TOTAL DEL MES','','','','','','',tS,tI,tT]];
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet(aoa);
  ws['!merges']=[{s:{r:0,c:0},e:{r:0,c:9}},{s:{r:1,c:0},e:{r:1,c:9}},{s:{r:2,c:0},e:{r:2,c:8}}];
  ws['A1']={v:'GRUPO TREGO SERVICIOS E INGENIERÍA S.A. DE C.V.',t:'s',s:{fill:gf(GOLDD),font:bf(true,WHITE,13),alignment:ac('center')}};
  ws['A2']={v:titulo,t:'s',s:{fill:gf('F5EDD6'),font:bf(true,GOLDD,11),alignment:ac('center')}};
  ws['A3']={v:'Fecha de generación: '+fmtDate(new Date().toISOString()),t:'s',s:{font:bf(false,GRAY,9)}};
  const hcols=['A','B','C','D','E','F','G','H','I','J'];
  hcols.forEach(col=>{const cell=ws[col+'4'];if(cell)cell.s={fill:gf(GOLD),font:bf(true,WHITE,10),alignment:ac('center')};});
  for(let i=0;i<rows.length;i++){
    const r=i+5;const fillHex=i%2===0?WHITE:CREAM;
    hcols.forEach((col,ci)=>{const ref=col+r;if(!ws[ref])return;ws[ref].s={fill:gf(fillHex),font:bf(false,DARK,9),alignment:ac(ci>=7?'right':'center')};if(ci>=7)ws[ref].z=mfmt;});
  }
  const tr=rows.length+5;
  ws['!merges'].push({s:{r:tr-1,c:0},e:{r:tr-1,c:6}});
  hcols.forEach((col,ci)=>{const ref=col+tr;if(!ws[ref])ws[ref]={t:'s',v:''};ws[ref].s={fill:gf(GOLD),font:bf(true,WHITE,10)};if(ci>=7)ws[ref].z=mfmt;});
  ws['A'+tr]={v:'TOTAL DEL MES',t:'s',s:{fill:gf(GOLD),font:bf(true,WHITE,10)}};
  ws['!cols']=[16,12,22,22,22,13,36,12,10,12].map(w=>({wch:w}));
  ws['!rows']=[{hpt:22},{hpt:18},{hpt:14},{hpt:20}];
  XLSX.utils.book_append_sheet(wb,ws,'Detalle');

  // ── Hoja 2: Resumen por proveedor ─────────────────

  const GASOLINA_DOC='gasolina/datos';
  let _gUnsub=null;

  async function gGuardar(){
    // Guardar en localStorage como respaldo
    try{localStorage.setItem('trego_diesel_v3',JSON.stringify({D:G.D,F:G.F}));}catch(e){}
    // Guardar en Firestore
    if(!_db||!_doc||!_setDoc)return;
    try{
      await _setDoc(_doc(_db,'gasolina','datos'),{
        compras:G.D.compras,
        cargas:G.D.cargas,
        distribuciones:G.D.distribuciones,
        proyectos:G.D.proyectos,
        equipos:G.D.equipos,
        personas:G.D.personas,
        updatedAt:new Date().toISOString(),
        updatedBy:S.user?.name||'sistema'
      });
    }catch(e){console.warn('Gasolina Firebase save error:',e);}
  }

  function gIniciarListener(){
    if(_gUnsub)_gUnsub();
    if(!_db||!_doc||!_onSnapshot)return;
    _gUnsub=_onSnapshot(_doc(_db,'gasolina','datos'),snap=>{
      if(!snap.exists())return;
      const data=snap.data();
      // Solo actualizar si el cambio vino de otro usuario
      const mismoUsuario=data.updatedBy===S.user?.name;
      if(!mismoUsuario&&data.compras){
        G.D.compras=data.compras||[];
        G.D.cargas=data.cargas||[];
        G.D.distribuciones=data.distribuciones||[];
        G.D.proyectos=data.proyectos||G.D.proyectos;
        G.D.equipos=data.equipos||G.D.equipos;
        G.D.personas=data.personas||G.D.personas;
        gRender();
      }
    });
  }
  function gSaldoTanque(coid){const co=G.D.compras.find(c=>c.id===coid);if(!co)return 0;const cargado=G.D.cargas.filter(c=>c.compraId===coid).reduce((a,c)=>a+c.litros,0);return co.litrosDisponibles-cargado;}
  function gSaldoCarga(caid){const ca=G.D.cargas.find(c=>c.id===caid);if(!ca)return 0;const dist=G.D.distribuciones.filter(d=>d.cargaId===caid).reduce((a,d)=>a+d.litros,0);return ca.litros-dist;}
  function gMsgH(k){const m=G.MG[k];return m?`<div class="${m.ok?'mok':'mer'}">${gesc(m.ok||m.err)}</div>`:'';}
  function gShowMsg(k,m){G.MG[k]=m;gRender();setTimeout(()=>{G.MG[k]=null;gRender();},2500);}

  function gRecalcRendimientos(){
    const porEq={};
    G.D.distribuciones.forEach(d=>{if(!d.equipoId||d.equipoId==='OTRODEMO')return;if(!porEq[d.equipoId])porEq[d.equipoId]=[];porEq[d.equipoId].push(d);});
    Object.values(porEq).forEach(arr=>{
      arr.sort((a,b)=>a.ts-b.ts);
      for(let i=0;i<arr.length-1;i++){const hrs=arr[i+1].horometro-arr[i].horometro;if(hrs>0)arr[i].rendimiento=Math.round((arr[i].litros/hrs)*100)/100;}
    });
  }

  }

  G.addDistrib=function(){
    if(!G.F.di_falta&&!G.F.di_nota.trim()){gShowMsg('surtir',{err:'Ingresa la nota o marca como FALTA'});return;}
    if(!G.F.di_lit){gShowMsg('surtir',{err:'Ingresa los litros'});return;}
    if(!G.F.di_proy){gShowMsg('surtir',{err:'Selecciona el proyecto'});return;}
    if(G.F.di_proy==='NUEVO'&&(!G.F.di_proytxt.trim()||!G.F.di_proynom.trim())){gShowMsg('surtir',{err:'Ingresa número y nombre del nuevo proyecto'});return;}
    if(!G.F.di_eq){gShowMsg('surtir',{err:'Selecciona el equipo'});return;}
    if(G.F.di_eq==='OTRO'&&(!G.F.di_eqcod.trim()||!G.F.di_eqtxt.trim())){gShowMsg('surtir',{err:'Ingresa código y descripción del equipo'});return;}
    if(!G.F.di_hor){gShowMsg('surtir',{err:'Ingresa el horómetro'});return;}
    if(!G.F.di_op){gShowMsg('surtir',{err:'Selecciona el operador'});return;}
    if(G.F.di_op==='NUEVO'&&!G.F.di_optxt.trim()){gShowMsg('surtir',{err:'Ingresa el nombre del operador'});return;}
    let prId=G.F.di_proy,prNum='',prNombre='';

    else{const pr=G.D.proyectos.find(p=>p.id===G.F.di_proy);prNum=pr?.numero||'';prNombre=pr?.nombre||'';}
    let eqId=G.F.di_eq,eqNombre='',eqCodigo='';
    if(G.F.di_eq==='OTRO'){const cod=G.F.di_eqcod.trim().toUpperCase();let existe=G.D.equipos.find(e=>e.codigo===cod);if(!existe){existe={id:gid(),codigo:cod,descripcion:G.F.di_eqtxt.trim(),tipo:'Rentado',ts:Date.now()};G.D.equipos.push(existe);}eqId=existe.id;eqNombre=`${existe.codigo} ${existe.descripcion}`;eqCodigo=existe.codigo;}
    else{const eq=G.D.equipos.find(e=>e.id===G.F.di_eq);eqNombre=eq?`${eq.codigo} ${eq.descripcion}`:'';eqCodigo=eq?.codigo||'';}
    let opId=G.F.di_op,opNombre='';
    if(G.F.di_op==='NUEVO'){const np={id:gid(),nombre:G.F.di_optxt.trim().toUpperCase(),ts:Date.now()};G.D.personas.push(np);opId=np.id;opNombre=np.nombre;}
    else{opNombre=G.D.personas.find(p=>p.id===G.F.di_op)?.nombre||'';}
    const litN=parseFloat(G.F.di_lit),horN=parseFloat(G.F.di_hor);
    const hist=G.D.distribuciones.filter(d=>d.equipoId===eqId).sort((a,b)=>b.ts-a.ts);
    const ult=hist[0];
    if(ult?.horometro!=null){const hrs=horN-ult.horometro;if(hrs>0){const rend=Math.round((ult.litros/hrs)*100)/100;G.D.distribuciones=G.D.distribuciones.map(d=>d.id===ult.id?{...d,rendimiento:rend}:d);}}
    G.D.distribuciones.push({id:gid(),cargaId:G.F.di_caid,compraId:G.F.di_coid,nota:G.F.di_falta?'FALTA':G.F.di_nota.trim(),notaFalta:G.F.di_falta,fecha:G.F.di_fecha,litros:litN,proyectoId:prId,proyectoNum:prNum,proyectoNombre:prNombre,equipoId:eqId,equipoNombre:eqNombre,equipoCodigo:eqCodigo,horometro:horN,rendimiento:null,operadorId:opId,operadorNombre:opNombre,ts:Date.now()});

  function gRResumen(){
    if(!G.D.compras.length)return`<div class="emp"><div style="font-size:40px">📊</div><div style="font-weight:bold;margin-top:12px">Sin datos aún</div></div>`;

    const cargas=G.D.cargas.filter(c=>c.compraId===co.id),totalCargado=cargas.reduce((a,c)=>a+c.litros,0);
    const distComp=G.D.distribuciones.filter(d=>d.compraId===co.id),totalDist=distComp.reduce((a,d)=>a+d.litros,0);

    const finCard=`<div class="card"><div class="ct">💰 Compra</div>
      <div class="cr"><span>Proveedor:</span><span style="font-weight:bold">${gesc(co.proveedor)}</span></div>

      <div class="stat-grid">

        <div class="stat-box"><div class="stat-val">${gfL(totalDist)}</div><div class="stat-lbl">Distribuido a máq.</div></div>
        <div class="stat-box"><div class="stat-val" style="color:${slTanque<0?'#e74c3c':'#C2AB74'}">${gfL(slTanque)}</div><div class="stat-lbl">Saldo en tanque</div></div>
        <div class="stat-box"><div class="stat-val">${gfL(slPipas)}</div><div class="stat-lbl">Saldo en pipas</div></div></div>
      <div class="pbg"><div class="pf" style="width:${pct.toFixed(0)}%"></div></div>
      <div style="color:#666;font-size:11px;text-align:right;margin-top:4px">${pct.toFixed(0)}% disponible en tanque</div></div>`;
    const porEq={};distComp.forEach(d=>{const k=d.equipoId||d.equipoCodigo;if(!porEq[k])porEq[k]={nombre:d.equipoNombre,litros:0,rends:[]};porEq[k].litros+=d.litros;if(d.rendimiento!=null)porEq[k].rends.push(d.rendimiento);});
    const porPr={};distComp.forEach(d=>{const k=d.proyectoId||d.proyectoNum;if(!porPr[k])porPr[k]={num:d.proyectoNum,nombre:d.proyectoNombre,litros:0};porPr[k].litros+=d.litros;});
    const eqCard=Object.keys(porEq).length?`<div class="card"><div class="ct">Por equipo</div>${Object.values(porEq).sort((a,b)=>b.litros-a.litros).map(d=>{const avg=d.rends.length?(d.rends.reduce((a,b)=>a+b,0)/d.rends.length).toFixed(2):null;const p=(d.litros/co.litrosDisponibles)*100;return`<div style="margin-bottom:13px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-weight:bold;font-size:13px">${gesc(d.nombre)}</span><span style="color:#C2AB74;font-weight:bold">${gfL(d.litros)} LT</span></div><div class="pbl"><div class="pf" style="width:${p.toFixed(0)}%"></div></div><div style="display:flex;justify-content:space-between;font-size:11px;color:#606060;margin-top:3px"><span>${p.toFixed(2)}% del total</span><span>${avg?'⚙ '+avg+' L/h':'Rendimiento pendiente'}</span></div></div>`;}).join('')}</div>`:'';
    const prCard=Object.keys(porPr).length?`<div class="card"><div class="ct">Por proyecto</div>${Object.values(porPr).sort((a,b)=>b.litros-a.litros).map(d=>{const p=(d.litros/co.litrosDisponibles)*100;return`<div style="margin-bottom:13px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-weight:bold;font-size:13px">${gesc(d.num)} — ${gesc(d.nombre)}</span><span style="color:#C2AB74;font-weight:bold">${gfL(d.litros)} LT</span></div><div class="pbl"><div class="pf" style="width:${p.toFixed(0)}%"></div></div><div style="font-size:11px;color:#606060;text-align:right;margin-top:3px">${p.toFixed(2)}% del total</div></div>`;}).join('')}</div>`:'';
    const btnExcel=`<button class="bp" style="margin-top:4px" onclick="_G.exportarExcel()">📊 Generar reporte Excel</button>`;
    return selHtml+finCard+flujoCard+eqCard+prCard+`<div class="card">${btnExcel}</div>`;
  }

  G.exportarExcel=function(){
    const co=G.D.compras.find(c=>c.id===G.F.re_coid);
    if(!co){alert('Selecciona una compra primero');return;}
    if(typeof XLSX==='undefined'){alert('La librería XLSX no está disponible');return;}
    const dist=G.D.distribuciones.filter(d=>d.compraId===co.id);
    if(!dist.length){alert('No hay distribuciones para exportar');return;}
    function num(n){return Math.round(parseFloat(n||0)*1000)/1000;}
    function makeSheet(title,headers,rows,colWidths,opts){
      const aoa=[[title],[''],[...headers],...rows];
      const ws=XLSX.utils.aoa_to_sheet(aoa);
      const range=XLSX.utils.decode_range(ws['!ref']||'A1');
      for(let C=range.s.c;C<=range.e.c;C++){const cell=XLSX.utils.encode_cell({r:0,c:C});if(!ws[cell])ws[cell]={t:'s',v:''};ws[cell].s={font:{bold:true,color:{rgb:'FFFFFF'},sz:12},fill:{fgColor:{rgb:'1A1A1A'},patternType:'solid'}};}
      for(let C=range.s.c;C<=range.e.c;C++){const cell=XLSX.utils.encode_cell({r:2,c:C});if(!ws[cell])ws[cell]={t:'s',v:''};ws[cell].s={font:{bold:true,color:{rgb:'000000'},sz:10},fill:{fgColor:{rgb:'C2AB74'},patternType:'solid'}};}
      for(let R=3;R<=range.e.r;R++){for(let C=range.s.c;C<=range.e.c;C++){const cell=XLSX.utils.encode_cell({r:R,c:C});if(!ws[cell])continue;const isGold=(opts?.goldCols||[]).includes(C),isTotal=(opts?.totalRows||[]).includes(R-3),isTotLbl=(opts?.totalLblCols||[]).includes(C)&&isTotal;ws[cell].s={font:{bold:isTotal,color:{rgb:isGold?'A8924F':'1A1A1A'},sz:9},fill:{fgColor:{rgb:isTotal?'F5EDD6':R%2===0?'FAF6EE':'FFFFFF'},patternType:'solid'},alignment:{horizontal:isGold||isTotal?'right':'left'}};if(isGold){ws[cell].z='"$"#,##0.000';}}}
      ws['!merges']=[{s:{r:0,c:0},e:{r:0,c:headers.length-1}},{s:{r:1,c:0},e:{r:1,c:headers.length-1}}];
      if(colWidths)ws['!cols']=colWidths;return ws;
    }
    const wb=XLSX.utils.book_new();
    const cargas=G.D.cargas.filter(c=>c.compraId===co.id);
    const r1=[];cargas.forEach(ca=>{const sl=gSaldoCarga(ca.id),nd=G.D.distribuciones.filter(d=>d.cargaId===ca.id).length;r1.push([ca.nota,ca.fecha,ca.conductorNombre,num(ca.litros),num(ca.litros-sl),num(sl),nd]);});
    const ws1=makeSheet(`Control de Pipa — Fac. ${co.factura}`,['Nota/Remisión','Fecha','Conductor','Litros cargados','Litros surtidos','Saldo','# Distribuciones'],r1,[{wch:14},{wch:11},{wch:20},{wch:16},{wch:16},{wch:12},{wch:14}],{goldCols:[3,4,5]});
    XLSX.utils.book_append_sheet(wb,ws1,'Cargas de pipa');
    const porPr={};dist.forEach(d=>{const k=d.proyectoNum;if(!porPr[k])porPr[k]={num:d.proyectoNum,nombre:d.proyectoNombre,litros:0};porPr[k].litros+=d.litros;});
    const r2=Object.values(porPr).sort((a,b)=>b.litros-a.litros).map(d=>[d.num,d.nombre,num(d.litros),(d.litros/co.litrosDisponibles*100).toFixed(2)+'%']);
    r2.push(['TOTAL','',num(Object.values(porPr).reduce((a,d)=>a+d.litros,0)),'']);
    const ws2=makeSheet('Distribución por proyecto',['Proyecto','Descripción','Litros','% del total'],r2,[{wch:12},{wch:28},{wch:14},{wch:12}],{goldCols:[2],totalRows:[r2.length-1],totalLblCols:[0,1]});
    XLSX.utils.book_append_sheet(wb,ws2,'Por proyecto');
    const porEq2={};dist.forEach(d=>{const k=d.equipoId||d.equipoCodigo;if(!porEq2[k])porEq2[k]={cod:d.equipoCodigo,nombre:d.equipoNombre,litros:0,rends:[],horoms:[]};porEq2[k].litros+=d.litros;if(d.rendimiento!=null)porEq2[k].rends.push(d.rendimiento);if(d.horometro)porEq2[k].horoms.push(d.horometro);});
    const r3=[];Object.values(porEq2).sort((a,b)=>b.litros-a.litros).forEach(d=>{const avg=d.rends.length?(d.rends.reduce((a,b)=>a+b,0)/d.rends.length).toFixed(2):'';const ultHor=d.horoms.length?Math.max(...d.horoms):'';r3.push([d.cod,d.nombre,num(d.litros),avg,ultHor,d.horoms.length]);});
    const ws3=makeSheet('Rendimiento por Máquina',['Código','Máquina','Litros totales','Rendimiento (L/h)','Últ. horómetro','N° cargas'],r3,[{wch:12},{wch:30},{wch:14},{wch:18},{wch:14},{wch:10}],{goldCols:[2]});
    XLSX.utils.book_append_sheet(wb,ws3,'Rendimiento por maquina');
    const cruce={};const proySet=[];dist.forEach(d=>{const ek=d.equipoCodigo;if(!cruce[ek])cruce[ek]={nombre:d.equipoNombre,proys:{}};cruce[ek].proys[d.proyectoNum]=(cruce[ek].proys[d.proyectoNum]||0)+d.litros;if(!proySet.includes(d.proyectoNum))proySet.push(d.proyectoNum);});proySet.sort();
    const r4=[];Object.values(cruce).forEach(d=>{const fila=[d.nombre];let tot=0;proySet.forEach(pn=>{const v=d.proys[pn]||0;tot+=v;fila.push(v?num(v):'');});fila.push(num(tot));r4.push(fila);});
    const totF=['TOTAL'];let gt=0;proySet.forEach(pn=>{let s=0;Object.values(cruce).forEach(d=>{s+=d.proys[pn]||0;});gt+=s;totF.push(num(s));});totF.push(num(gt));r4.push(totF);
    const ws4=makeSheet('Máquina en cada Proyecto',['Máquina \\ Proyecto',...proySet,'TOTAL'],r4,[{wch:30},...proySet.map(()=>({wch:13})),{wch:13}],{goldCols:[proySet.length+1],totalRows:[r4.length-1],totalLblCols:[0]});
    XLSX.utils.book_append_sheet(wb,ws4,'Maquina por proyecto');
    const r5=[];dist.slice().sort((a,b)=>a.ts-b.ts).forEach(d=>{const ca=G.D.cargas.find(c=>c.id===d.cargaId);r5.push([d.fecha,ca?ca.nota:'',ca?ca.conductorNombre:'',d.nota,d.proyectoNum,d.proyectoNombre,d.equipoCodigo,d.equipoNombre,num(d.litros),d.horometro,d.rendimiento!=null?d.rendimiento:'',d.operadorNombre]);});
    const ws5=makeSheet('Detalle Completo de Distribuciones',['Fecha','Nota carga','Conductor pipa','Nota dist.','Proyecto','Desc. proyecto','Cód. equipo','Máquina','Litros','Horómetro','Rend. (L/h)','Operador'],r5,[{wch:11},{wch:11},{wch:18},{wch:10},{wch:12},{wch:24},{wch:12},{wch:26},{wch:10},{wch:11},{wch:11},{wch:20}],{goldCols:[8]});
    XLSX.utils.book_append_sheet(wb,ws5,'Detalle completo');
    try{XLSX.writeFile(wb,`Reporte_Diesel_TREGO_${co.factura}_${co.fecha}.xlsx`.replace(/[\/\\:*?"<>|]/g,'-'));}catch(e){alert('No se pudo generar: '+e.message);}
  };

  // gRender() es llamado por gCargarFirebase().then() arriba

}
