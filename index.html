<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C2AB74;--gold-dark:#A8924F;--gold-light:#F5EDD6;--gold-xlight:#FAF6EE;
  --bg:#F8F7F4;--white:#FFFFFF;--text:#1A1A1A;--text2:#666666;--border:#E5E0D5;
  --radius:10px;--radius-sm:6px;
  --card-bg:#FFFFFF;--input-bg:#FFFFFF;--header-bg:#C2AB74;
}
body.dark{
  --bg:#1A1A1A;--white:#252525;--text:#F0EDE8;--text2:#AAA;--border:#3A3530;
  --card-bg:#252525;--input-bg:#2E2E2E;--gold-xlight:#2A2520;--gold-light:#3A3020;
}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s}
.screen{display:none;min-height:100vh}
.screen.active{display:block}

/* WELCOME */
#screen-welcome{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#FAF6EE 0%,#F5EDD6 50%,#FAF6EE 100%)}
.welcome-inner{text-align:center;padding:40px 20px}
.welcome-logo{opacity:0;animation:fadeUp .8s ease forwards .3s}
.welcome-title{opacity:0;animation:fadeUp .8s ease forwards .8s;font-size:28px;font-weight:800;color:#1A1A1A;margin-top:16px;letter-spacing:1px}
.welcome-sub{opacity:0;animation:fadeUp .8s ease forwards 1.1s;font-size:14px;color:var(--gold);margin-top:6px;letter-spacing:2px;text-transform:uppercase}
.welcome-q{opacity:0;animation:fadeUp .8s ease forwards 1.5s;font-size:16px;color:#606060;margin-top:40px;margin-bottom:24px}
.welcome-btns{opacity:0;animation:fadeUp .8s ease forwards 1.8s;display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.welcome-btn{padding:16px 36px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;border:none;letter-spacing:.5px;transition:transform .15s,box-shadow .15s}
.welcome-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.btn-cajas{background:var(--gold);color:#1a1a1a}
.btn-konfio{background:#fff;color:#A8924F;border:2px solid #C2AB74;cursor:pointer}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* TOPBAR */
.gold-bar{background:var(--gold);color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo-badge{width:36px;height:36px;background:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;color:var(--gold)}
.content{padding:14px;max-width:960px;margin:0 auto}

/* FORMS */
input,select,textarea{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--input-bg);color:var(--text);font-family:inherit;outline:none;transition:border-color .15s}
input:focus,select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(194,171,116,.15)}
input[readonly]{background:var(--gold-xlight);color:var(--text2)}
button{cursor:pointer;font-family:inherit;font-size:13px;border-radius:var(--radius-sm);border:1px solid var(--border);padding:8px 14px;background:var(--card-bg);color:var(--text);transition:all .15s}
button:hover{background:var(--gold-light)}
.btn-gold{background:var(--gold);color:#fff;border-color:var(--gold);font-weight:600}
.btn-gold:hover{background:var(--gold-dark);border-color:var(--gold-dark)}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-danger{background:#fff0f0;color:#c0392b;border-color:#f5c6c6}
.btn-dark{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff}

/* CARDS */
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.card-alert{border-left:4px solid #E53935}
.label{font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.metric{background:var(--gold-xlight);border-radius:var(--radius-sm);padding:12px;text-align:center;border:1px solid var(--gold-light)}
.metric .val{font-size:17px;font-weight:700;color:var(--gold)}
.metric .lbl{font-size:11px;color:var(--text2);margin-top:2px}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.badge-pending{background:#faeeda;color:#7a4a00}
.badge-paid{background:#e8f5e9;color:#1b5e20}
.badge-open{background:#e3f2fd;color:#0d47a1}
.badge-closed{background:#f3f3f3;color:#555}

/* ALERTS */
.alert{border-radius:var(--radius-sm);padding:10px 13px;font-size:12px;margin-bottom:10px;display:flex;align-items:flex-start;gap:8px}
.alert-warn{background:#fff8e1;border:1px solid #ffe082;color:#5a3e00}
.alert-err{background:#ffebee;border:1px solid #ffcdd2;color:#7b1c1c}
.alert-ok{background:#e8f5e9;border:1px solid #c8e6c9;color:#1b5e20}
.alert-info{background:#e3f2fd;border:1px solid #bbdefb;color:#0d3c6e}

/* TABLE */
.tbl-wrap{overflow-x:auto;margin-top:8px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--gold);color:#fff;padding:8px 7px;text-align:left;font-weight:600;font-size:11px;white-space:nowrap}
td{padding:7px 7px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--text)}
tr:nth-child(even) td{background:var(--gold-xlight)}
tr:hover td{background:var(--gold-light)}
.total-row td{background:var(--gold)!important;color:#fff;font-weight:700}
.row-alert td{background:#fff8e1!important}

/* TABS */
.nav-tabs{display:flex;gap:2px;margin-bottom:14px;border-bottom:2px solid var(--border);flex-wrap:wrap}
.tab{padding:9px 14px;font-size:13px;cursor:pointer;border-bottom:3px solid transparent;color:var(--text2);background:none;border-radius:0;border-left:none;border-right:none;border-top:none;margin-bottom:-2px;font-weight:500;white-space:nowrap}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);font-weight:700}
.tab:hover{background:var(--gold-xlight);color:var(--gold)}
.section-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px}

/* XML DROP */
.xml-drop{border:2px dashed var(--gold);border-radius:var(--radius);padding:16px;text-align:center;cursor:pointer;color:var(--text2);font-size:13px;background:var(--gold-xlight);transition:background .15s}
.xml-drop:hover{background:var(--gold-light)}
.xml-drop i{font-size:28px;color:var(--gold);display:block;margin-bottom:6px}

/* PIN */
.pin-dots{display:flex;gap:10px;justify-content:center;margin:14px 0}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--gold);background:transparent;transition:background .15s}
.pin-dot.filled{background:var(--gold)}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:220px;margin:0 auto}
.numpad button{height:48px;font-size:18px;font-weight:600;border-radius:var(--radius-sm)}

/* BARS */
.bar-wrap{margin-bottom:10px}
.bar-label{font-size:11px;color:var(--text2);margin-bottom:3px;display:flex;justify-content:space-between}
.bar-bg{background:var(--border);border-radius:4px;height:14px;overflow:hidden;cursor:pointer}
.bar-fill{height:100%;background:var(--gold);border-radius:4px;transition:width .5s}

/* HISTORY */
.history-item{font-size:11px;padding:7px 0;border-bottom:1px solid var(--border);color:var(--text2);display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--gold-dark);color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;display:flex;align-items:center;gap:8px;box-shadow:0 4px 20px rgba(0,0,0,.25);transform:translateY(100px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}
.toast.err{background:#c0392b}

/* SUMMARY CARDS */
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px}
.sum-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center}
.sum-card .sv{font-size:22px;font-weight:700;color:var(--gold)}
.sum-card .sl{font-size:11px;color:var(--text2);margin-top:3px}

/* DARK TOGGLE */
.dark-toggle{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:5px 9px;border-radius:6px;font-size:13px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:var(--card-bg);border-radius:var(--radius);padding:20px;max-width:500px;width:100%;max-height:80vh;overflow-y:auto}

@media(max-width:600px){.grid2,.grid3{grid-template-columns:1fr}.tab{padding:8px 10px;font-size:11px}}
</style>
</head>

// ── HELPERS ───────────────────────────────────────────────────────────────
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function fmt(n){return new Intl.NumberFormat('es-MX',{style:'currency',currency:'MXN'}).format(n||0)}
function fmtDate(d){if(!d)return '';try{return new Date(d).toLocaleDateString('es-MX')}catch(e){return d}}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function isAdmin(){return ['admin','superadmin'].includes(S.user?.role)}
function isSuperAdmin(){return S.user?.role==='superadmin'}
function canEditKonfio(){return ['admin','superadmin'].includes(S.user?.role)}

function toast(msg, isErr=false){
  const t=document.getElementById('toast');
  t.innerHTML=`<i class="ti ti-${isErr?'alert-circle':'circle-check'}"></i>${msg}`;
  t.className='toast'+(isErr?' err':'');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

// ── FIREBASE ──────────────────────────────────────────────────────────────
async function fbSave(){
  try{
    await _setDoc(_doc(_db,'app','state'),{
      cajas:S.cajas, katalogo:S.katalogo, biblioteca:S.biblioteca,
      konfioData:S.konfioData, users:S.users, updatedAt:new Date().toISOString()
    });
  }catch(e){console.error(e);}
}

function fbListen(){
  if(S.unsub) S.unsub();
  S.unsub = _onSnapshot(_doc(_db,'app','state'),(snap)=>{
    if(snap.exists()){
      const d=snap.data();
      S.cajas=d.cajas||[];
      S.katalogo=d.katalogo||S.katalogo;
      S.biblioteca=d.biblioteca||[];
      S.konfioData=d.konfioData||{};
      S.users=d.users||S.users;
      refreshCurrentView();
    }
  });
}

function refreshCurrentView(){
  const cur=document.querySelector('.screen.active')?.id;
  if(cur==='screen-main'){
    renderSummaryBar();
    const activeTab=document.querySelector('.tab.active')?.getAttribute('onclick');
    if(activeTab?.includes('cajas-cf')) renderCajasList('cf');
    else if(activeTab?.includes('cajas-sf')) renderCajasList('sf');
    else if(activeTab?.includes('cajas-gen')) renderCajasGen();
    else if(activeTab?.includes('dashboard')) renderDashboard();
    else if(activeTab?.includes('biblioteca')) renderBiblioteca();
    else if(activeTab?.includes('catalogo')) renderCatalogo();
  }
  if(cur==='screen-caja') renderCajaContent();
  if(cur==='screen-konfio') renderKonfio();
}

  showScreen('screen-login');

window.backToWelcome=function(){

  S.user=null;S.pinBuffer='';updateDots();
  document.getElementById('login-err').style.display='none';
  showScreen('screen-welcome');
};

window.logout=function(){
  if(S.unsub){S.unsub();S.unsub=null;}
  S.user=null;S.activeCajaId=null;S.pinBuffer='';
  updateDots();document.getElementById('login-err').style.display='none';
  showScreen('screen-welcome');
};

// ── PIN ───────────────────────────────────────────────────────────────────
window.pinKey=function(k){
  const err=document.getElementById('login-err');
  if(k==='back'){S.pinBuffer=S.pinBuffer.slice(0,-1);}
  else if(k==='ok'){
    const u=S.users[S.pinBuffer];
    if(u){
      S.user={...u,pin:S.pinBuffer};err.style.display='none';S.pinBuffer='';updateDots();loginOk();
    }else{err.style.display='flex';S.pinBuffer='';}
  }else{if(S.pinBuffer.length<4)S.pinBuffer+=k;}
  updateDots();
};
function updateDots(){for(let i=0;i<4;i++)document.getElementById('d'+i)?.classList.toggle('filled',i<S.pinBuffer.length);}

async function loginOk(){
  // load state
  try{
    const {getDoc}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const snap=await getDoc(_doc(_db,'app','state'));
    if(snap.exists()){const d=snap.data();S.cajas=d.cajas||[];S.katalogo=d.katalogo||S.katalogo;S.biblioteca=d.biblioteca||[];S.konfioData=d.konfioData||{};S.users=d.users||S.users;}
  }catch(e){}
  fbListen();
  if(S.appMode==='konfio'){
    document.getElementById('konfio-user-chip').textContent=S.user.name;
    showScreen('screen-konfio');
    renderKonfio();
  } else {
    document.getElementById('user-chip').textContent=S.user.name;
    document.getElementById('tab-btn-dashboard').style.display=isAdmin()?'':'none';
    document.getElementById('tab-btn-catalogo').style.display=isAdmin()?'':'none';
    showScreen('screen-main');
    renderSummaryBar();
    renderCajasList('cf');
  }
}

// ── SUMMARY BAR ───────────────────────────────────────────────────────────
function renderSummaryBar(){
  const pagadas=S.cajas.filter(c=>c.estatus==='pagado').length;
  const noPagadas=S.cajas.filter(c=>c.estatus==='no_pagado').length;
  const now=new Date();
  const totalMes=S.cajas.flatMap(c=>c.gastos).filter(g=>{
    if(!g.registradoEn)return false;
    const d=new Date(g.registradoEn);
    return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
  }).reduce((s,g)=>s+(g.total||g.monto||0),0);
  document.getElementById('summary-bar').innerHTML=`
    <div class="summary-grid">
      <div class="sum-card"><div class="sv">${S.cajas.length}</div><div class="sl">Total cajas</div></div>
      <div class="sum-card"><div class="sv" style="color:#1b5e20">${pagadas}</div><div class="sl">Pagadas</div></div>
      <div class="sum-card"><div class="sv" style="color:#c0392b">${noPagadas}</div><div class="sl">No pagadas</div></div>
      <div class="sum-card"><div class="sv">${fmt(totalMes)}</div><div class="sl">Gasto este mes</div></div>
    </div>`;
}

// ── TABS ──────────────────────────────────────────────────────────────────
window.showTab=function(t){
  document.querySelectorAll('[id^="tab-"]').forEach(el=>{if(el.tagName==='DIV')el.style.display='none';});
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  const el=document.getElementById('tab-'+t);if(el)el.style.display='block';
  document.querySelectorAll('.tab').forEach(b=>{if(b.getAttribute('onclick')?.includes("'"+t+"'"))b.classList.add('active');});
  if(t==='cajas-cf')renderCajasList('cf');
  else if(t==='cajas-sf')renderCajasList('sf');
  else if(t==='cajas-gen')renderCajasGen();
  else if(t==='dashboard')renderDashboard();
  else if(t==='biblioteca')renderBiblioteca();
  else if(t==='catalogo')renderCatalogo();
};

window.showMain=function(){S.activeCajaId=null;showScreen('screen-main');showTab('cajas-cf');};

// ── CAJAS LIST ────────────────────────────────────────────────────────────
function hasOldInvoices(c){
  return c.gastos.some(g=>g.fechaFactura&&(new Date()-new Date(g.fechaFactura))/(864e5)>14);
}

function cajaCard(c){
  const tot=c.gastos.reduce((s,g)=>s+(g.total||g.monto||0),0);
  const eb=c.estatus==='pagado'?'<span class="badge badge-paid"><i class="ti ti-circle-check"></i> Pagado</span>':'<span class="badge badge-pending"><i class="ti ti-clock"></i> No pagado</span>';
  const esb=c.estado==='abierta'?'<span class="badge badge-open">Abierta</span>':'<span class="badge badge-closed">Cerrada</span>';
  const tipoBadge=c.tipo==='sf'?'<span class="badge" style="background:#f3e5f5;color:#6a1b9a">Sin factura</span>':'<span class="badge" style="background:#e8f5e9;color:#1b5e20">Con factura</span>';
  const oldAlert=isAdmin()&&hasOldInvoices(c)?'card-alert':'';
  const oldIcon=isAdmin()&&hasOldInvoices(c)?'<i class="ti ti-alert-triangle" style="color:#e53935;margin-left:6px" title="Facturas con más de 2 semanas"></i>':'';
  return `<div class="card ${oldAlert}" style="cursor:pointer;transition:box-shadow .15s" onmouseover="this.style.boxShadow='0 2px 12px rgba(194,171,116,.25)'" onmouseout="this.style.boxShadow=''" onclick="abrirCaja('${c.id}')">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">
      <div><div style="font-size:14px;font-weight:700;margin-bottom:4px">${c.name}${oldIcon}</div>
      <div style="font-size:11px;color:var(--text2)">${fmtDate(c.createdAt)} · ${c.gastos.length} registro(s)</div></div>
      <div style="display:flex;gap:5px;flex-wrap:wrap">${tipoBadge} ${eb} ${esb}</div>
    </div>
    <div style="margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="metric"><div class="val">${fmt(tot)}</div><div class="lbl">Total de la caja</div></div>
      <div class="metric"><div class="val" style="font-size:16px">${c.gastos.length}</div><div class="lbl">Registros</div></div>
    </div>
  </div>`;
}

function renderCajasList(tipo){
  const el=document.getElementById('tab-cajas-'+tipo);
  if(!el)return;
  const filtered=S.cajas.filter(c=>c.tipo===tipo);
  if(!filtered.length){el.innerHTML='<div style="text-align:center;padding:30px;color:var(--text2)"><i class="ti ti-folder-off" style="font-size:32px;display:block;margin-bottom:8px"></i>Sin cajas. Crea una nueva.</div>';return;}
  let notif='';
  if(isAdmin()){
    const pend=filtered.filter(c=>c.estatus==='no_pagado').length;
    if(pend>0)notif=`<div class="alert alert-warn"><i class="ti ti-bell"></i><span>${pend} caja${pend>1?'s':''} pendiente${pend>1?'s':''} de pago</span></div>`;
  }
  el.innerHTML=notif+filtered.slice().reverse().map(cajaCard).join('')+
    `<div style="margin-top:10px"><button onclick="exportConsolidado('${tipo}')" class="btn-sm"><i class="ti ti-download"></i> Exportar reporte consolidado</button></div>`;
}

function renderCajasGen(){
  const el=document.getElementById('tab-cajas-gen');
  if(!S.cajas.length){el.innerHTML='<div style="text-align:center;padding:30px;color:var(--text2)">Sin cajas registradas.</div>';return;}
  el.innerHTML=S.cajas.slice().reverse().map(cajaCard).join('');
}

// ── CREAR CAJA ────────────────────────────────────────────────────────────
window.crearCaja=async function(){
  const name=document.getElementById('new-caja-name').value.trim().toUpperCase();
  if(!name){alert('Escribe el nombre de la caja');return;}
  const tipo=document.querySelector('input[name="tipo-caja"]:checked').value;
  const c={id:genId(),name,tipo,estatus:'no_pagado',estado:'abierta',gastos:[],adjuntos:{},
    historial:[{ts:new Date().toISOString(),user:S.user.name,accion:'Caja creada: '+name}],createdAt:new Date().toISOString()};
  S.cajas.push(c);await fbSave();
  document.getElementById('new-caja-name').value='';
  toast('Caja creada exitosamente');
  showTab('cajas-'+tipo);
};

// ── ABRIR CAJA ────────────────────────────────────────────────────────────
window.abrirCaja=function(id){
  S.activeCajaId=id;
  const c=S.cajas.find(x=>x.id===id);
  document.getElementById('caja-title-bar').textContent=c.name;
  document.getElementById('caja-sub-bar').textContent=(c.tipo==='cf'?'Con factura':'Sin factura')+' · '+(c.estado==='abierta'?'Abierta':'Cerrada');
  const eb=document.getElementById('caja-estatus-badge');
  eb.innerHTML=c.estatus==='pagado'?'<span class="badge badge-paid">Pagado</span>':'<span class="badge badge-pending">No pagado</span>';
  const bp=document.getElementById('btn-pago');
  if(isAdmin()){bp.style.display='';bp.textContent=c.estatus==='pagado'?'Marcar no pagado':'Marcar pagado';}
  else bp.style.display='none';
  renderCajaContent();
  showScreen('screen-caja');
};

window.togglePago=async function(){
  const c=S.cajas.find(x=>x.id===S.activeCajaId);
  c.estatus=c.estatus==='pagado'?'no_pagado':'pagado';
  c.historial.push({ts:new Date().toISOString(),user:S.user.name,accion:'Estatus: '+(c.estatus==='pagado'?'Pagado':'No pagado')});
  await fbSave();toast('Estatus actualizado');abrirCaja(S.activeCajaId);
};

// ── RENDER CAJA CONTENT ───────────────────────────────────────────────────
function renderCajaContent(){
  const c=S.cajas.find(x=>x.id===S.activeCajaId);
  if(!c)return;
  const isCerrada=c.estado==='cerrada';
  const tSub=c.gastos.reduce((s,g)=>s+(g.subtotal||0),0);
  const tIva=c.gastos.reduce((s,g)=>s+(g.iva||0),0);
  const tTot=c.gastos.reduce((s,g)=>s+(g.total||g.monto||0),0);

  // Old invoice alert
  const alertas=isAdmin()?c.gastos.filter(g=>g.fechaFactura&&(new Date()-new Date(g.fechaFactura))/(864e5)>14):[];
  let alertHtml=alertas.length?`<div class="alert alert-warn"><i class="ti ti-alert-triangle"></i><span><b>${alertas.length} factura(s)</b> con fecha mayor a 2 semanas: ${alertas.map(g=>g.noFactura||'s/n').join(', ')}</span></div>`:'';

  // Repeated descriptions (sin factura)
  let repeatHtml='';
  if(isAdmin()&&c.tipo==='sf'){
    const now=new Date();
    const descCount={};
    c.gastos.forEach(g=>{
      if(!g.registradoEn)return;
      const d=new Date(g.registradoEn);
      if(d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()){
        const k=(g.descripcion||'').toUpperCase();
        descCount[k]=(descCount[k]||0)+1;
      }
    });
    const reps=Object.entries(descCount).filter(([,v])=>v>=3);
    if(reps.length)repeatHtml=`<div class="alert alert-warn"><i class="ti ti-repeat"></i><span>Gastos repetidos este mes (3+): <b>${reps.map(([k])=>k).join(', ')}</b></span></div>`;
  }

  let formHtml='';
  if(!isCerrada){
    if(c.tipo==='cf') formHtml=buildFormCF(c);
    else formHtml=buildFormSF(c);
  }

  // Table
  let tbody='';
  if(c.tipo==='cf'){
    tbody=c.gastos.length?c.gastos.map(g=>{
      const vieja=isAdmin()&&g.fechaFactura&&(new Date()-new Date(g.fechaFactura))/(864e5)>14;
      return `<tr class="${vieja?'row-alert':''}">
        <td>${fmtDate(g.fechaFactura)}</td><td>${g.equipo||''}</td><td>${g.proveedor||''}</td>
        <td>${g.descripcion||''}</td><td>${g.noFactura||''}</td>
        <td style="font-size:10px;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${g.uuid||''}">${(g.uuid||'').substring(0,16)}...</td>
        <td style="text-align:right">${fmt(g.subtotal)}</td><td style="text-align:right">${fmt(g.iva)}</td>
        <td style="text-align:right;font-weight:700">${fmt(g.total)}</td>
        <td style="text-align:center">${g.adjunto?'<i class="ti ti-paperclip" style="color:var(--gold)"></i>':''}</td>
      </tr>`;
    }).join(''):'<tr><td colspan="10" style="text-align:center;color:var(--text2);padding:20px">Sin gastos</td></tr>';
  } else {
    tbody=c.gastos.length?c.gastos.map(g=>{
      return `<tr>
        <td>${fmtDate(g.fecha)}</td><td>${g.equipo||''}</td><td>${g.descripcion||''}</td>
        <td style="text-align:right;font-weight:700">${fmt(g.monto)}</td>
        <td style="text-align:center">${g.adjunto?'<i class="ti ti-paperclip" style="color:var(--gold)"></i>':''}</td>
      </tr>`;
    }).join(''):'<tr><td colspan="5" style="text-align:center;color:var(--text2);padding:20px">Sin gastos</td></tr>';
  }

  const tableHeaders=c.tipo==='cf'
    ?'<th>Fecha</th><th>Equipo</th><th>Proveedor</th><th>Descripción</th><th>No.Fact</th><th>UUID</th><th style="text-align:right">Subtotal</th><th style="text-align:right">IVA</th><th style="text-align:right">Total</th><th>Adj.</th>'
    :'<th>Fecha</th><th>Equipo</th><th>Descripción</th><th style="text-align:right">Monto</th><th>Ticket</th>';
  const totalCols=c.tipo==='cf'?6:3;
  const totalCells=c.tipo==='cf'
    ?`<td style="text-align:right">${fmt(tSub)}</td><td style="text-align:right">${fmt(tIva)}</td><td style="text-align:right;font-size:14px">${fmt(tTot)}</td><td></td>`
    :`<td style="text-align:right;font-size:14px">${fmt(tTot)}</td><td></td>`;

  // Comprobante pago
  let compHtml='';
  if(isAdmin()){
    compHtml=`<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
      <div class="label">comprobante de pago (solo Jack/Admin)</div>
      <input type="file" id="comp-pago-file" accept=".pdf,image/*" style="margin-top:4px">
      <button onclick="subirComprobante()" class="btn-gold btn-sm" style="margin-top:6px"><i class="ti ti-upload"></i> Adjuntar comprobante</button>
      ${c.comprobantePago?`<div style="margin-top:6px;font-size:12px;color:var(--gold)"><i class="ti ti-paperclip"></i> ${c.comprobantePago.name} adjunto</div>`:''}
    </div>`;
  } else if(c.comprobantePago){
    compHtml=`<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
      <div class="label">comprobante de pago</div>
      <div style="font-size:12px;color:var(--gold);margin-top:4px"><i class="ti ti-paperclip"></i> ${c.comprobantePago.name}</div>
    </div>`;
  }

  // Nota admin
  let notaHtml='';
  if(isAdmin()){
    notaHtml=`<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
      <div class="label">nota interna (solo admins)</div>
      <div style="display:flex;gap:8px;margin-top:4px">
        <input type="text" id="nota-input" placeholder="Nota de revisión..." style="flex:1" value="${(c.notaAdmin||'').replace(/"/g,'&quot;')}">
        <button onclick="guardarNota()" class="btn-gold btn-sm">Guardar</button>
      </div>
      ${c.notaAdmin?`<div style="margin-top:6px;font-size:12px;color:var(--text2);background:var(--gold-xlight);padding:8px;border-radius:var(--radius-sm)">${c.notaAdmin}</div>`:''}
    </div>`;
  }

  let adminActions='';
  if(isAdmin()){
    adminActions=c.estado==='abierta'
      ?`<button onclick="cerrarCaja()" class="btn-sm btn-danger" style="margin-top:8px"><i class="ti ti-lock"></i> Cerrar caja</button>`
      :`<div class="alert alert-info" style="margin-top:8px"><i class="ti ti-lock"></i> Caja cerrada — solo lectura</div>`;
    if(isSuperAdmin()&&c.estado==='cerrada'&&c.estatus==='pagado'){
      adminActions+=`<button onclick="eliminarCaja()" class="btn-sm btn-danger" style="margin-top:6px;margin-left:6px"><i class="ti ti-trash"></i> Eliminar caja</button>`;
    }
  }

  const hist=`<div class="card" style="margin-top:12px">
    <div class="section-title"><i class="ti ti-history"></i> Historial</div>
    ${(c.historial||[]).slice().reverse().slice(0,15).map(h=>`<div class="history-item"><span>${h.accion}</span><span style="white-space:nowrap">${h.user} · ${fmtDate(h.ts)}</span></div>`).join('')}
  </div>`;

  document.getElementById('caja-content').innerHTML=`
    ${alertHtml}${repeatHtml}${formHtml}
    <div class="card" style="margin-top:12px">
      <div class="section-title"><i class="ti ti-table"></i> Gastos registrados</div>
      <div class="tbl-wrap">
        <table><thead><tr>${tableHeaders}</tr></thead>
        <tbody>${tbody}</tbody>
        <tfoot><tr class="total-row">
          <td colspan="${totalCols}" style="text-align:right">Total de la caja</td>${totalCells}
        </tr></tfoot></table>
      </div>
      ${compHtml}${notaHtml}${adminActions}
    </div>${hist}`;
}

// ── FORM CON FACTURA ──────────────────────────────────────────────────────
function buildFormCF(c){
  const catAll=[...S.katalogo.maquinaria,...S.katalogo.vehiculo,...S.katalogo.area,...S.katalogo.proyecto];
  return `<div class="card">
    <div class="section-title"><i class="ti ti-file-plus"></i> Registrar gasto</div>
    <div id="xml-alert"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
      <div class="xml-drop" onclick="document.getElementById('xml-input').click()">
        <i class="ti ti-file-code"></i>
        <div style="font-weight:600;font-size:12px">Cargar XML del SAT</div>
        <div style="font-size:11px;margin-top:2px;color:var(--gold)">Auto-llena todos los campos</div>
      </div>
      <div class="xml-drop" onclick="document.getElementById('xml-biblio').click()" style="border-color:#888">
        <i class="ti ti-database" style="color:#888"></i>
        <div style="font-weight:600;font-size:12px">Buscar en Biblioteca</div>
        <div style="font-size:11px;margin-top:2px">Buscar por RFC del proveedor</div>
      </div>
    </div>
    <input type="file" id="xml-input" accept=".xml" style="display:none" onchange="parseXML(event,'caja')">
    <div id="biblio-search-box" style="display:none;margin-bottom:10px">
      <div class="label">RFC del proveedor</div>
      <div style="display:flex;gap:8px">
        <input type="text" id="biblio-rfc" placeholder="ej. EEN050121RC9" style="flex:1;text-transform:uppercase" oninput="this.value=this.value.toUpperCase()">
        <button onclick="buscarBiblioteca()" class="btn-gold btn-sm">Buscar</button>
        <button onclick="document.getElementById('biblio-search-box').style.display='none'" class="btn-sm">✕</button>
      </div>
      <div id="biblio-results" style="margin-top:8px"></div>
    </div>
    <input type="text" id="xml-biblio" style="display:none" onclick="toggleBiblioSearch()">
    <div class="grid2" style="margin-top:8px">
      <div><div class="label">equipo / proyecto *</div>
        <select id="f-equipo" onchange="toggleOtro()">

// ── XML PARSER ────────────────────────────────────────────────────────────
function parseXMLContent(txt, allUUIDs){
  const doc=new DOMParser().parseFromString(txt,'application/xml');
  let comp=doc.querySelector('Comprobante');
  if(!comp)return{err:'XML no válido o no es CFDI del SAT'};
  const estado=comp.getAttribute('Estado')||'';
  if(estado.toLowerCase().includes('cancel'))return{err:'Factura CANCELADA — no se puede registrar'};
  let timbre=doc.querySelector('TimbreFiscalDigital');
  const uuid=timbre?.getAttribute('UUID')||'';
  if(uuid&&allUUIDs.includes(uuid))return{err:'UUID duplicado — esta factura ya fue registrada'};
  const fecha=comp.getAttribute('Fecha')||'';
  const subtotal=parseFloat(comp.getAttribute('SubTotal')||'0');
  const total=parseFloat(comp.getAttribute('Total')||'0');
  const iva=parseFloat((total-subtotal).toFixed(2));
  let serie=comp.getAttribute('Serie')||'';
  let folio=comp.getAttribute('Folio')||'';
  let noFact=(serie+folio).trim()||folio||serie;
  // Emisor
  let emisor=doc.querySelector('Emisor');
  let rfc=emisor?.getAttribute('Rfc')||'';
  let nombre=emisor?.getAttribute('Nombre')||'';
  return{uuid,fecha,subtotal,total,iva,noFact,rfc,nombre,rawFecha:fecha};
}

function getAllUUIDs(){
  const cajasUUIDs=S.cajas.flatMap(c=>c.gastos.map(g=>g.uuid)).filter(Boolean);
  const konfioUUIDs=Object.values(S.konfioData).flatMap(m=>m.gastos||[]).map(g=>g.uuid).filter(Boolean);
  return [...cajasUUIDs,...konfioUUIDs];
}

window.parseXML=function(e, ctx){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    const alertEl=document.getElementById(ctx==='caja'?'xml-alert':'konfio-xml-alert');
    const res=parseXMLContent(ev.target.result,getAllUUIDs());
    if(res.err){
      if(alertEl)alertEl.innerHTML=`<div class="alert alert-err"><i class="ti ti-alert-circle"></i>${res.err}</div>`;
      e.target.value='';return;
    }
    const prefix=ctx==='caja'?'f-':'kf-';
    const setVal=(id,val)=>{const el=document.getElementById(prefix+id);if(el){el.value=val;if(id==='uuid')el.dataset.uuid=val;if(id==='nofact')el.dataset.rawFecha=res.rawFecha;}};
    setVal('nofact',res.noFact);
    setVal('fecha',res.fecha?new Date(res.fecha).toLocaleDateString('es-MX'):'');
    setVal('uuid',res.uuid);
    setVal('subtotal',res.subtotal.toFixed(2));
    setVal('iva',res.iva.toFixed(2));
    setVal('total',res.total.toFixed(2));
    // Auto-fill proveedor
    const provEl=document.getElementById(ctx==='caja'?'f-proveedor':'kf-proveedor');
    if(provEl&&res.nombre)provEl.value=res.nombre;
    if(alertEl)alertEl.innerHTML=`<div class="alert alert-ok"><i class="ti ti-circle-check"></i> XML cargado — ${res.nombre||res.rfc}</div>`;
    // Add to biblioteca (no raw XML stored)
    if(res.uuid){
      const exists=S.biblioteca.find(x=>x.uuid===res.uuid);
      if(!exists){
        S.biblioteca.push({uuid:res.uuid,rfc:res.rfc,nombre:res.nombre,noFact:res.noFact,fecha:res.fecha,subtotal:res.subtotal,iva:res.iva,total:res.total,usado:false});
        fbSave();
      }
    }
  };
  reader.readAsText(file,'UTF-8');
};

window.registrarGastoCF=async function(){
  const c=S.cajas.find(x=>x.id===S.activeCajaId);
  let equipo=document.getElementById('f-equipo').value;
  if(equipo==='__otro__')equipo=document.getElementById('f-equipo-otro').value.trim();
  const proveedor=document.getElementById('f-proveedor').value.trim();
  const desc=document.getElementById('f-desc').value.trim();
  if(!equipo||!proveedor||!desc){toast('Completa equipo, proveedor y descripción',true);return;}
  const uuid=document.getElementById('f-uuid').dataset?.uuid||document.getElementById('f-uuid').value;
  if(!uuid){toast('Carga un XML válido del SAT',true);return;}
  const adjFile=document.getElementById('f-adjunto').files[0];
  const gasto={
    id:genId(),equipo,proveedor,descripcion:desc,
    noFactura:document.getElementById('f-nofact').value,
    fechaFactura:document.getElementById('f-nofact').dataset?.rawFecha||'',
    uuid,
    subtotal:parseFloat(document.getElementById('f-subtotal').value)||0,
    iva:parseFloat(document.getElementById('f-iva').value)||0,
    total:parseFloat(document.getElementById('f-total').value)||0,
    adjunto:adjFile?adjFile.name:null,
    registradoPor:S.user.name,registradoEn:new Date().toISOString()
  };
  if(adjFile){
    await new Promise(res=>{
      const r=new FileReader();
      r.onload=ev=>{if(!c.adjuntos)c.adjuntos={};c.adjuntos[gasto.id]={name:adjFile.name,data:ev.target.result};res();};
      r.readAsDataURL(adjFile);
    });
  }
  // Mark biblioteca entry as used
  const bibEntry=S.biblioteca.find(b=>b.uuid===uuid);
  if(bibEntry)bibEntry.usado=true;
  c.gastos.push(gasto);
  c.historial.push({ts:new Date().toISOString(),user:S.user.name,accion:`Gasto: ${desc} — ${proveedor} — ${fmt(gasto.total)}`});
  await fbSave();
  limpiarFormCF();
  toast('Gasto registrado exitosamente ✓');
  renderCajaContent();
};

window.exportarCaja=function(){
  const c=S.cajas.find(x=>x.id===S.activeCajaId);
  if(!c||!c.gastos.length){toast('Sin gastos para exportar',true);return;}
  const wb=XLSX.utils.book_new();
  let headers,rows,sheetName;
  if(c.tipo==='cf'){
    headers=['FECHA','EQUIPO / PROYECTO','PROVEEDOR','DESCRIPCIÓN','NO. FACTURA','UUID / FOLIO FISCAL','SUBTOTAL','IVA','TOTAL'];
    rows=c.gastos.map(g=>[fmtDate(g.fechaFactura),g.equipo,g.proveedor,g.descripcion,g.noFactura,g.uuid,g.subtotal,g.iva,g.total]);
    const tS=c.gastos.reduce((s,g)=>s+(g.subtotal||0),0);
    const tI=c.gastos.reduce((s,g)=>s+(g.iva||0),0);
    const tT=c.gastos.reduce((s,g)=>s+(g.total||0),0);
    rows.push(['TOTAL DE LA CAJA','','','','','',tS,tI,tT]);
    sheetName='GRUPO';
  } else {
    headers=['FECHA','EQUIPO / PROYECTO','DESCRIPCIÓN','MONTO','REGISTRADO POR'];
    rows=c.gastos.map(g=>[fmtDate(g.fecha),g.equipo,g.descripcion,g.monto,g.registradoPor]);
    rows.push(['TOTAL DE LA CAJA','','',c.gastos.reduce((s,g)=>s+(g.monto||0),0),'']);
    sheetName='GRUPO SIN FACTURA';
  }
  const ws=XLSX.utils.aoa_to_sheet([headers,...rows]);
  ws['!cols']=(c.tipo==='cf'?[12,22,22,22,13,36,12,10,12]:[13,26,28,13,14]).map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb,ws,sheetName);
  const xlsxData=XLSX.write(wb,{bookType:'xlsx',type:'base64'});
  const zip=new JSZip();
  zip.file(c.name+'.xlsx',xlsxData,{base64:true});
  if(c.adjuntos)Object.values(c.adjuntos).forEach(a=>{if(a.data)zip.file('adjuntos/'+a.name,a.data.split(',')[1],{base64:true});});
  if(c.comprobantePago?.data)zip.file('comprobante/'+c.comprobantePago.name,c.comprobantePago.data.split(',')[1],{base64:true});
  zip.generateAsync({type:'base64'}).then(b64=>{
    const a=document.createElement('a');a.href='data:application/zip;base64,'+b64;
    a.download=c.name.replace(/\s+/g,'_')+'.zip';a.click();
  });
};

      const tS=cfGastos.reduce((s,g)=>s+(g.subtotal||0),0),tI=cfGastos.reduce((s,g)=>s+(g.iva||0),0),tT=cfGastos.reduce((s,g)=>s+(g.total||0),0);
      rows.push(['TOTAL CONSOLIDADO','','','','','','',tS,tI,tT,'']);
      const ws=XLSX.utils.aoa_to_sheet([headers,...rows]);
      ws['!cols']=[18,12,16,22,22,14,36,12,10,12,12].map(w=>({wch:w}));
      XLSX.utils.book_append_sheet(wb,ws,'GRUPO');
    }
  }
  if(tipo==='sf'||tipo==='ambos'){
    const sfGastos=all.filter(g=>g._tipo==='sf');
    if(sfGastos.length){
      const headers=['CAJA','FECHA','EQUIPO','DESCRIPCIÓN','MONTO','ESTATUS'];
      const rows=sfGastos.map(g=>[g._caja,fmtDate(g.fecha),g.equipo,g.descripcion,g.monto,g._est==='pagado'?'Pagado':'No pagado']);
      rows.push(['TOTAL','','','',sfGastos.reduce((s,g)=>s+(g.monto||0),0),'']);
      const ws=XLSX.utils.aoa_to_sheet([headers,...rows]);
      ws['!cols']=[18,12,22,28,13,12].map(w=>({wch:w}));
      XLSX.utils.book_append_sheet(wb,ws,'GRUPO SIN FACTURA');
    }
  }
  XLSX.writeFile(wb,'Reporte_Consolidado_GT.xlsx');

window.cargarBatch=function(e){
  const files=Array.from(e.target.files);
  let loaded=0;
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=async function(ev){
      const res=parseXMLContent(ev.target.result,[]);
      if(!res.err&&res.uuid){
        const exists=S.biblioteca.find(x=>x.uuid===res.uuid);
        if(!exists)S.biblioteca.push({uuid:res.uuid,rfc:res.rfc,nombre:res.nombre,noFact:res.noFact,fecha:res.fecha,subtotal:res.subtotal,iva:res.iva,total:res.total,usado:false,raw:ev.target.result});
      }
      loaded++;
      if(loaded===files.length){await fbSave();toast(`${loaded} XML(s) cargados a la biblioteca`);renderBiblioteca();}
    };
    reader.readAsText(file,'UTF-8');
  });
};

window.filtrarBiblio=function(){
  const q=document.getElementById('bib-filter').value.toLowerCase();
  const filtered=S.biblioteca.filter(x=>(x.rfc||'').toLowerCase().includes(q)||(x.nombre||'').toLowerCase().includes(q));
  const t=document.getElementById('bib-table');
  if(t)t.innerHTML=renderBibTable(filtered);
};

// ── DASHBOARD ─────────────────────────────────────────────────────────────
function renderDashboard(){
  const el=document.getElementById('tab-dashboard');
  el.innerHTML=`<div class="card">
    <div class="section-title"><i class="ti ti-chart-bar"></i> Gasto por equipo / proyecto</div>
    <div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">
      <button onclick="setFiltro('dia')" id="fb-dia" class="btn-sm btn-gold">Hoy</button>
      <button onclick="setFiltro('semana')" id="fb-semana" class="btn-sm">Semana</button>
      <button onclick="setFiltro('mes')" id="fb-mes" class="btn-sm">Mes</button>
      <button onclick="setFiltro('todo')" id="fb-todo" class="btn-sm">Todo</button>
      <input type="date" id="fb-from" style="width:130px;font-size:11px;padding:4px 6px" onchange="setFiltro('rango')">
      <span style="font-size:11px;align-self:center">al</span>
      <input type="date" id="fb-to" style="width:130px;font-size:11px;padding:4px 6px" onchange="setFiltro('rango')">
    </div>
    <div id="dash-equipos"></div>
  </div>
  <div class="card">
    <div class="section-title"><i class="ti ti-building-store"></i> Top 5 proveedores</div>
    <div id="dash-proveedores"></div>
  </div>
  <div class="card">
    <div class="section-title"><i class="ti ti-chart-donut"></i> Con factura vs Sin factura</div>
    <div id="dash-tipos" style="display:flex;gap:20px;align-items:center;flex-wrap:wrap"></div>
  </div>`;
  applyDashFilter();
}

function applyDashFilter(){
  const now=new Date();const f=S.filtro;
  const gastos=S.cajas.flatMap(c=>c.gastos.map(g=>({...g,_tipo:c.tipo})));
  const filtered=gastos.filter(g=>{
    const dateStr=g.registradoEn||g.fecha;
    if(!dateStr)return f==='todo';
    const d=new Date(dateStr);
    if(f==='dia')return d.toDateString()===now.toDateString();
    if(f==='semana')return(now-d)/(864e5)<=7;
    if(f==='mes')return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    if(f==='rango'){
      const from=document.getElementById('fb-from')?.value;
      const to=document.getElementById('fb-to')?.value;
      if(from&&to)return d>=new Date(from)&&d<=new Date(to+'T23:59:59');
      return true;
    }
    return true;
  });

  // Equipos
  const byEq={};filtered.forEach(g=>{const k=g.equipo||'Sin equipo';byEq[k]=(byEq[k]||0)+(g.total||g.monto||0);});
  const sortedEq=Object.entries(byEq).sort((a,b)=>b[1]-a[1]);
  const maxEq=sortedEq[0]?.[1]||1;
  const eqEl=document.getElementById('dash-equipos');
  if(eqEl)eqEl.innerHTML=sortedEq.slice(0,15).map(([k,v])=>`
    <div class="bar-wrap">
      <div class="bar-label"><span>${k}</span><span style="font-weight:700">${fmt(v)}</span></div>
      <div class="bar-bg" onclick="verDetalleEquipo('${k.replace(/'/g,"\\'")}')"><div class="bar-fill" style="width:${Math.round(v/maxEq*100)}%"></div></div>
    </div>`).join('')||'<div style="color:var(--text2);font-size:13px;text-align:center;padding:20px">Sin datos</div>';

  // Proveedores top 5
  const byPv={};filtered.filter(g=>g._tipo==='cf').forEach(g=>{const k=g.proveedor||'Sin proveedor';byPv[k]=(byPv[k]||0)+(g.total||0);});
  const sortedPv=Object.entries(byPv).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxPv=sortedPv[0]?.[1]||1;
  const pvEl=document.getElementById('dash-proveedores');
  if(pvEl)pvEl.innerHTML=sortedPv.map(([k,v])=>`
    <div class="bar-wrap">
      <div class="bar-label"><span>${k}</span><span style="font-weight:700">${fmt(v)}</span></div>
      <div class="bar-bg"><div class="bar-fill" style="width:${Math.round(v/maxPv*100)}%;background:#888"></div></div>
    </div>`).join('')||'<div style="color:var(--text2);font-size:13px;text-align:center;padding:20px">Sin datos</div>';

  // Tipos
  const totalCF=filtered.filter(g=>g._tipo==='cf').reduce((s,g)=>s+(g.total||0),0);
  const totalSF=filtered.filter(g=>g._tipo==='sf').reduce((s,g)=>s+(g.monto||0),0);
  const total=totalCF+totalSF||1;
  const tEl=document.getElementById('dash-tipos');
  if(tEl)tEl.innerHTML=`
    <div class="metric" style="flex:1"><div class="val">${fmt(totalCF)}</div><div class="lbl">Con factura (${Math.round(totalCF/total*100)}%)</div></div>
    <div class="metric" style="flex:1"><div class="val">${fmt(totalSF)}</div><div class="lbl">Sin factura (${Math.round(totalSF/total*100)}%)</div></div>
    <div class="metric" style="flex:1"><div class="val">${fmt(totalCF+totalSF)}</div><div class="lbl">Total general</div></div>`;
}

window.setFiltro=function(f){
  S.filtro=f;
  ['dia','semana','mes','todo'].forEach(k=>{const b=document.getElementById('fb-'+k);if(b)b.className=k===f?'btn-sm btn-gold':'btn-sm';});
  applyDashFilter();
};

window.verDetalleEquipo=function(equipo){
  const gastos=S.cajas.flatMap(c=>c.gastos).filter(g=>g.equipo===equipo);
  const byFact={};gastos.forEach(g=>{const k=g.noFactura||g.descripcion||'s/n';byFact[k]=(byFact[k]||0)+(g.total||g.monto||0);});
  const sorted=Object.entries(byFact).sort((a,b)=>b[1]-a[1]);
  const total=sorted.reduce((s,[,v])=>s+v,0)||1;
  const overlay=document.createElement('div');
  overlay.className='modal-overlay';
  overlay.innerHTML=`<div class="modal-box">
    <div class="section-title"><i class="ti ti-chart-donut"></i> Detalle: ${equipo}</div>
    ${sorted.map(([k,v])=>`<div class="bar-wrap">
      <div class="bar-label"><span>${k}</span><span>${fmt(v)} (${Math.round(v/total*100)}%)</span></div>
      <div class="bar-bg"><div class="bar-fill" style="width:${Math.round(v/total*100)}%"></div></div>
    </div>`).join('')}
    <button onclick="this.closest('.modal-overlay').remove()" class="btn-gold" style="margin-top:12px;width:100%">Cerrar</button>
  </div>`;
  document.body.appendChild(overlay);
};

// ── CATÁLOGO ──────────────────────────────────────────────────────────────
function renderCatalogo(){
  const el=document.getElementById('tab-catalogo');
  const all=[...S.katalogo.maquinaria.map(x=>({tipo:'Maquinaria',k:'maquinaria',v:x})),...S.katalogo.vehiculo.map(x=>({tipo:'Vehículo',k:'vehiculo',v:x})),...S.katalogo.area.map(x=>({tipo:'Área',k:'area',v:x})),...S.katalogo.proyecto.map(x=>({tipo:'Proyecto',k:'proyecto',v:x}))];
  el.innerHTML=`<div class="card">
    <div class="section-title"><i class="ti ti-list"></i> Catálogo</div>
    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
      <input type="text" id="cat-input" placeholder="Nueva opción..." style="flex:1;min-width:150px">
      <select id="cat-tipo" style="width:130px">
        <option value="maquinaria">Maquinaria</option><option value="vehiculo">Vehículo</option>
        <option value="area">Área</option><option value="proyecto">Proyecto</option>
      </select>
      <button class="btn-gold btn-sm" onclick="agregarCatalogo()"><i class="ti ti-plus"></i></button>
    </div>
    <div style="max-height:320px;overflow-y:auto">
      <table><thead><tr><th style="width:65%">Elemento</th><th style="width:20%">Tipo</th><th style="width:15%"></th></tr></thead>
      <tbody>${all.map(x=>`<tr><td style="font-size:12px">${x.v}</td>
        <td><span class="badge badge-open" style="font-size:10px">${x.tipo}</span></td>
        <td><button onclick="eliminarCatalogo('${x.k}','${x.v.replace(/'/g,"\\'")}'')" class="btn-sm btn-danger" style="padding:3px 7px"><i class="ti ti-trash"></i></button></td>
      </tr>`).join('')}</tbody></table>
    </div>
  </div>`;
}

window.agregarCatalogo=async function(){
  const val=document.getElementById('cat-input').value.trim();
  const tipo=document.getElementById('cat-tipo').value;
  if(!val)return;
  S.katalogo[tipo].push(val);
  document.getElementById('cat-input').value='';
  await fbSave();toast('Agregado al catálogo');renderCatalogo();
};

window.eliminarCatalogo=async function(tipo,val){
  S.katalogo[tipo]=S.katalogo[tipo].filter(x=>x!==val);
  await fbSave();renderCatalogo();
};

// ── KONFIO ────────────────────────────────────────────────────────────────
const MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
let kState={anio:null,mes:null};

function renderKonfio(){
  const el=document.getElementById('konfio-content');
  if(!kState.anio){
    el.innerHTML=`<div class="card" style="max-width:400px;margin:30px auto">
      <div class="section-title"><i class="ti ti-calendar"></i> Selecciona el período</div>
      <div class="label">año</div>
      <div style="display:flex;gap:10px;margin-bottom:16px">
        <button onclick="selAnio(2026)" class="btn-gold" style="flex:1;padding:12px;font-size:15px;font-weight:700">2026</button>
        <button onclick="selAnio(2027)" style="flex:1;padding:12px;font-size:15px;font-weight:700">2027</button>
      </div>
    </div>`;
    return;
  }
  if(!kState.mes){
    el.innerHTML=`<div class="card" style="max-width:500px;margin:20px auto">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
        <button onclick="kState.anio=null;renderKonfio()" class="btn-sm"><i class="ti ti-arrow-left"></i></button>
        <div class="section-title" style="margin-bottom:0;border-bottom:none">${kState.anio}</div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
        ${MESES.map((m,i)=>{
          const key=`${kState.anio}-${String(i+1).padStart(2,'0')}`;
          const data=S.konfioData[key];
          const total=(data?.gastos||[]).reduce((s,g)=>s+(g.total||0),0);
          return`<button onclick="selMes(${i+1})" style="padding:12px 8px;text-align:center;border-radius:var(--radius-sm)">
            <div style="font-weight:700;font-size:13px">${m}</div>
            ${total>0?`<div style="font-size:11px;color:var(--gold);margin-top:3px">${fmt(total)}</div>`:'<div style="font-size:10px;color:var(--text2);margin-top:3px">Sin gastos</div>'}
          </button>`;
        }).join('')}
      </div>
    </div>`;
    return;
  }
  const key=`${kState.anio}-${String(kState.mes).padStart(2,'0')}`;
  if(!S.konfioData[key])S.konfioData[key]={gastos:[],adjuntos:{}};
  const data=S.konfioData[key];
  const catAll=[...S.katalogo.maquinaria,...S.katalogo.vehiculo,...S.katalogo.area,...S.katalogo.proyecto];
  const canEdit=canEditKonfio();
  const tSub=data.gastos.reduce((s,g)=>s+(g.subtotal||0),0);
  const tIva=data.gastos.reduce((s,g)=>s+(g.iva||0),0);
  const tTot=data.gastos.reduce((s,g)=>s+(g.total||0),0);

  const formHtml=canEdit?`<div class="card">
    <div class="section-title"><i class="ti ti-file-plus"></i> Registrar gasto</div>
    <div id="konfio-xml-alert"></div>
    <div class="xml-drop" onclick="document.getElementById('kf-xml-input').click()" style="margin-bottom:10px">
      <i class="ti ti-file-code"></i>
      <div style="font-weight:600;font-size:12px">Cargar XML del SAT</div>
      <div style="font-size:11px;margin-top:2px;color:var(--gold)">Auto-llena todos los campos</div>
    </div>
    <input type="file" id="kf-xml-input" accept=".xml" style="display:none" onchange="parseXML(event,'konfio')">
    <div class="grid2" style="margin-top:8px">
      <div><div class="label">proyecto *</div>
        <select id="kf-equipo">
          <option value="">Seleccionar...</option>
          ${catAll.map(x=>`<option>${x}</option>`).join('')}
        </select>
      </div>
      <div><div class="label">proveedor *</div><input type="text" id="kf-proveedor" placeholder="Nombre del proveedor"></div>
    </div>
    <div style="margin-top:8px"><div class="label">concepto *</div><input type="text" id="kf-desc" placeholder="Ej. REFACCIONES, COMBUSTIBLE..."></div>
    <div class="grid3" style="margin-top:8px">
      <div><div class="label">no. factura</div><input type="text" id="kf-nofact" readonly></div>
      <div><div class="label">fecha</div><input type="text" id="kf-fecha" readonly></div>
      <div><div class="label">UUID</div><input type="text" id="kf-uuid" readonly style="font-size:10px"></div>
    </div>
    <div class="grid3" style="margin-top:8px">
      <div><div class="label">subtotal</div><input type="number" id="kf-subtotal" readonly></div>
      <div><div class="label">IVA</div><input type="number" id="kf-iva" readonly></div>
      <div><div class="label">total</div><input type="number" id="kf-total" readonly style="font-weight:700"></div>
    </div>
    <div style="margin-top:12px;display:flex;gap:8px">
      <button class="btn-gold" onclick="registrarGastoKonfio()"><i class="ti ti-plus"></i> Registrar</button>
      <button onclick="limpiarKonfio()"><i class="ti ti-refresh"></i> Limpiar</button>
    </div>
  </div>`:'';

  const tbody=data.gastos.length?data.gastos.map(g=>`<tr>
    <td>GRUPO TREGO</td><td>${fmtDate(g.fechaFactura)}</td><td>${g.proyecto||''}</td>
    <td>${g.proveedor||''}</td><td>${g.concepto||''}</td>
    <td>${g.noFactura||''}</td>
    <td style="text-align:right">${fmt(g.subtotal)}</td><td style="text-align:right">${fmt(g.iva)}</td>
    <td style="text-align:right;font-weight:700">${fmt(g.total)}</td>
  </tr>`).join(''):'<tr><td colspan="9" style="text-align:center;color:var(--text2);padding:20px">Sin gastos</td></tr>';

  el.innerHTML=`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
      <button onclick="kState.mes=null;renderKonfio()" class="btn-sm"><i class="ti ti-arrow-left"></i></button>
      <div style="font-size:15px;font-weight:700">${MESES[kState.mes-1]} ${kState.anio}</div>
      <div style="flex:1"></div>
      <button onclick="exportarKonfio()" class="btn-gold btn-sm"><i class="ti ti-download"></i> Excel</button>
    </div>
    ${formHtml}
    <div class="card" style="margin-top:12px">
      <div class="section-title"><i class="ti ti-table"></i> Gastos del mes</div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Empresa</th><th>Fecha</th><th>Proyecto</th><th>Proveedor</th><th>Concepto</th><th>No.Fact</th><th style="text-align:right">Subtotal</th><th style="text-align:right">IVA</th><th style="text-align:right">Total</th></tr></thead>
          <tbody>${tbody}</tbody>
          <tfoot><tr class="total-row">
            <td colspan="6" style="text-align:right">Total del mes</td>
            <td style="text-align:right">${fmt(tSub)}</td><td style="text-align:right">${fmt(tIva)}</td>
            <td style="text-align:right;font-size:14px">${fmt(tTot)}</td>
          </tr></tfoot>
        </table>
      </div>
    </div>`;
}

window.selAnio=function(a){kState.anio=a;kState.mes=null;renderKonfio();};
window.selMes=function(m){kState.mes=m;renderKonfio();};

window.registrarGastoKonfio=async function(){
  const key=`${kState.anio}-${String(kState.mes).padStart(2,'0')}`;
  if(!S.konfioData[key])S.konfioData[key]={gastos:[],adjuntos:{}};
  const proyecto=document.getElementById('kf-equipo').value;
  const proveedor=document.getElementById('kf-proveedor').value.trim();
  const concepto=document.getElementById('kf-desc').value.trim();
  if(!proyecto||!proveedor||!concepto){toast('Completa proyecto, proveedor y concepto',true);return;}
  const uuid=document.getElementById('kf-uuid').dataset?.uuid||document.getElementById('kf-uuid').value;
  if(!uuid){toast('Carga un XML válido del SAT',true);return;}
  const gasto={
    id:genId(),proyecto,proveedor,concepto,
    noFactura:document.getElementById('kf-nofact').value,
    fechaFactura:document.getElementById('kf-nofact').dataset?.rawFecha||'',
    uuid,
    subtotal:parseFloat(document.getElementById('kf-subtotal').value)||0,
    iva:parseFloat(document.getElementById('kf-iva').value)||0,
    total:parseFloat(document.getElementById('kf-total').value)||0,
    registradoPor:S.user.name,registradoEn:new Date().toISOString()
  };
  S.konfioData[key].gastos.push(gasto);
  await fbSave();limpiarKonfio();toast('Gasto KONFIO registrado ✓');renderKonfio();
};

window.limpiarKonfio=function(){
  ['kf-equipo','kf-proveedor','kf-desc','kf-nofact','kf-fecha','kf-uuid','kf-subtotal','kf-iva','kf-total'].forEach(id=>{
    const el=document.getElementById(id);if(el){el.value='';delete el.dataset.rawFecha;delete el.dataset.uuid;}
  });
  const xa=document.getElementById('konfio-xml-alert');if(xa)xa.innerHTML='';
  const xi=document.getElementById('kf-xml-input');if(xi)xi.value='';
};

window.exportarKonfio=function(){
  const key=`${kState.anio}-${String(kState.mes).padStart(2,'0')}`;
  const data=S.konfioData[key];
  if(!data?.gastos?.length){toast('Sin gastos para exportar',true);return;}
  const headers=['EMPRESA','FECHA','PROYECTO','PROVEEDOR','CONCEPTO','NO. FACTURA','UUID','SUBTOTAL','IVA','TOTAL'];
  const rows=data.gastos.map(g=>['GRUPO TREGO',fmtDate(g.fechaFactura),g.proyecto,g.proveedor,g.concepto,g.noFactura,g.uuid,g.subtotal,g.iva,g.total]);
  const tS=data.gastos.reduce((s,g)=>s+(g.subtotal||0),0);
  const tI=data.gastos.reduce((s,g)=>s+(g.iva||0),0);
  const tT=data.gastos.reduce((s,g)=>s+(g.total||0),0);
  rows.push(['TOTAL DEL MES','','','','','','',tS,tI,tT]);
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet([headers,...rows]);
  ws['!cols']=[16,12,22,22,22,13,36,12,10,12].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb,ws,'GRUPO');
  XLSX.writeFile(wb,`KONFIO_${MESES[kState.mes-1]}_${kState.anio}.xlsx`);
};

</script>
